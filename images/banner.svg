<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="160" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="150" y1="0" x2="150" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
    <line x1="450" y1="0" x2="450" y2="160"/>
  </g>

  <!-- Animated glow line -->
  <rect x="-200" y="78" width="200" height="2" fill="url(#glow)" rx="1">
    <animate attributeName="x" from="-200" to="800" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Logo mark -->
  <g transform="translate(40, 45)">
    <rect width="48" height="48" rx="10" fill="none" stroke="url(#accent)" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="24" y="34" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="22" font-weight="bold">sw</text>
  </g>

  <!-- Title -->
  <text x="110" y="68" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">sw-kit</text>
  <text x="110" y="92" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2">HARNESS ENGINEERING AGENT</text>

  <!-- Version badge -->
  <rect x="110" y="102" width="52" height="20" rx="4" fill="#6366f1" opacity="0.2"/>
  <text x="136" y="116" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11">v1.4.0</text>

  <!-- Right side: animated dots representing agents -->
  <g transform="translate(400, 50)">
    <!-- Sam -->
    <circle cx="20" cy="15" r="6" fill="#a78bfa">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <!-- Able -->
    <circle cx="50" cy="8" r="5" fill="#60a5fa">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Klay -->
    <circle cx="80" cy="18" r="5" fill="#7dd3fc">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Jay -->
    <circle cx="110" cy="5" r="5" fill="#fb923c">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <!-- Jerry -->
    <circle cx="140" cy="20" r="4" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <!-- Milla -->
    <circle cx="30" cy="45" r="5" fill="#4ade80">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <!-- Willji -->
    <circle cx="60" cy="50" r="5" fill="#f9a8d4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Derek -->
    <circle cx="90" cy="42" r="5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Rowan -->
    <circle cx="120" cy="52" r="4" fill="#a3e635">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
    <!-- Iron -->
    <circle cx="150" cy="40" r="5" fill="#d946ef">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Connection lines (pulse) -->
    <line x1="20" y1="15" x2="50" y2="8" stroke="#a78bfa" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="50" y1="8" x2="80" y2="18" stroke="#60a5fa" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="80" y1="18" x2="110" y2="5" stroke="#7dd3fc" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="45" x2="60" y2="50" stroke="#4ade80" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="50" x2="90" y2="42" stroke="#f9a8d4" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="42" x2="120" y2="52" stroke="#22d3ee" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="15" x2="30" y2="45" stroke="#a78bfa" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="110" y1="5" x2="150" y2="40" stroke="#fb923c" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" begin="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Bottom tagline -->
  <text x="300" y="148" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">
    10 agents · 5 innovations · 33 tests · Level 5 harness
  </text>
</svg>
