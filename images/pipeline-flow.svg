<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="80" rx="8" fill="url(#pbg)"/>

  <!-- Agent nodes -->
  <g font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">
    <!-- Klay -->
    <circle cx="60" cy="32" r="14" fill="#1e293b" stroke="#7dd3fc" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="36" fill="#7dd3fc" font-weight="600" font-size="9">Klay</text>
    <text x="60" y="60" fill="#64748b" font-size="8">Explore</text>

    <!-- Arrow 1 -->
    <line x1="78" y1="32" x2="102" y2="32" stroke="#475569" stroke-width="1"/>
    <circle cx="90" cy="32" r="2" fill="#818cf8">
      <animate attributeName="cx" from="78" to="102" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </circle>

    <!-- Able -->
    <circle cx="120" cy="32" r="14" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="120" y="36" fill="#60a5fa" font-weight="600" font-size="9">Able</text>
    <text x="120" y="60" fill="#64748b" font-size="8">Plan</text>

    <!-- Arrow 2 -->
    <line x1="138" y1="32" x2="162" y2="32" stroke="#475569" stroke-width="1"/>
    <circle cx="150" cy="32" r="2" fill="#818cf8">
      <animate attributeName="cx" from="138" to="162" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>

    <!-- Jay -->
    <circle cx="180" cy="24" r="12" fill="#1e293b" stroke="#fb923c" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="28" fill="#fb923c" font-weight="600" font-size="8">Jay</text>

    <!-- Derek -->
    <circle cx="180" cy="48" r="12" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="1.0s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="52" fill="#22d3ee" font-weight="600" font-size="8">Derek</text>

    <!-- Jerry -->
    <circle cx="230" cy="24" r="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="230" y="28" fill="#fbbf24" font-weight="600" font-size="8">Jerry</text>

    <!-- Willji -->
    <circle cx="230" cy="48" r="12" fill="#1e293b" stroke="#f9a8d4" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="230" y="52" fill="#f9a8d4" font-weight="600" font-size="8">Willji</text>

    <!-- Rowan -->
    <circle cx="280" cy="36" r="12" fill="#1e293b" stroke="#a3e635" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="280" y="40" fill="#a3e635" font-weight="600" font-size="8">Rowan</text>
    <text x="230" y="72" fill="#64748b" font-size="8">Build</text>

    <!-- Arrow 3 -->
    <line x1="296" y1="36" x2="340" y2="32" stroke="#475569" stroke-width="1"/>
    <circle cx="318" cy="34" r="2" fill="#818cf8">
      <animate attributeName="cx" from="296" to="340" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Milla -->
    <circle cx="360" cy="32" r="14" fill="#1e293b" stroke="#4ade80" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <text x="360" y="36" fill="#4ade80" font-weight="600" font-size="9">Milla</text>
    <text x="360" y="60" fill="#64748b" font-size="8">Review</text>

    <!-- Arrow 4 -->
    <line x1="378" y1="32" x2="422" y2="32" stroke="#475569" stroke-width="1"/>
    <circle cx="400" cy="32" r="2" fill="#818cf8">
      <animate attributeName="cx" from="378" to="422" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Sam -->
    <circle cx="440" cy="32" r="16" fill="#1e293b" stroke="#a78bfa" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="440" y="36" fill="#a78bfa" font-weight="700" font-size="10">Sam</text>
    <text x="440" y="60" fill="#64748b" font-size="8">Verify</text>

    <!-- Arrow 5 -->
    <line x1="460" y1="32" x2="504" y2="32" stroke="#475569" stroke-width="1"/>
    <circle cx="482" cy="32" r="2" fill="#4ade80">
      <animate attributeName="cx" from="460" to="504" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- PASS -->
    <rect x="508" y="18" width="60" height="28" rx="6" fill="#065f46" stroke="#4ade80" stroke-width="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="538" y="36" fill="#4ade80" font-weight="700" font-size="11">PASS</text>
    <text x="538" y="60" fill="#64748b" font-size="8">Done</text>
  </g>
</svg>
